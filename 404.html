  <script>
    (function () {
      function detect() {
        try { var s = localStorage.getItem("jl-lang"); if (s === "fr" || s === "en") return s; } catch (e) {}
        var n = (navigator.language || navigator.userLanguage || "fr").toLowerCase();
        return n.indexOf("en") === 0 ? "en" : "fr";
      }
      var L = detect();
      document.documentElement.lang = L;
      if (L === "en") {
        document.title = "404 — Page not found · By Joliment";
        var els = document.querySelectorAll("[data-en]");
        for (var i = 0; i < els.length; i++) els[i].innerHTML = els[i].getAttribute("data-en");
      }
    })();
  </script>
